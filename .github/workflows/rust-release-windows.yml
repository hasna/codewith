name: rust-release-windows

on:
  workflow_call:
    inputs:
      release_lto:
        required: true
        type: string
    secrets:
      AZURE_TRUSTED_SIGNING_CLIENT_ID:
        required: false
      AZURE_TRUSTED_SIGNING_TENANT_ID:
        required: false
      AZURE_TRUSTED_SIGNING_SUBSCRIPTION_ID:
        required: false
      AZURE_TRUSTED_SIGNING_ENDPOINT:
        required: false
      AZURE_TRUSTED_SIGNING_ACCOUNT_NAME:
        required: false
      AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME:
        required: false

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  build-windows-binaries:
    name: Build Windows binaries - ${{ matrix.runner }} - ${{ matrix.target }} - ${{ matrix.bundle }}
    runs-on: ${{ matrix.runs_on }}
    # Windows release builds can exceed an hour on cold runners, so keep the
    # timeout aligned with the top-level release build headroom.
    timeout-minutes: 180
    permissions:
      contents: read
    defaults:
      run:
        working-directory: codex-rs
    env:
      CARGO_PROFILE_RELEASE_LTO: ${{ inputs.release_lto }}
      # Compiler caching. SCCACHE_IGNORE_SERVER_IO_ERROR keeps builds fail-open:
      # a broken or unreachable cache backend must never fail a release build.
      # RUSTC_WRAPPER is set by the "Enable sccache" step only when the
      # (continue-on-error) install actually produced a runnable sccache, so
      # an install failure degrades to an uncached build instead of aborting
      # the release.
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-x64
            target: x86_64-pc-windows-msvc
            bundle: primary
            binaries: "codewith codex-responses-api-proxy"
            runs_on: windows-latest
          - runner: windows-arm64
            target: aarch64-pc-windows-msvc
            bundle: primary
            binaries: "codewith codex-responses-api-proxy"
            runs_on: windows-11-arm
          - runner: windows-x64
            target: x86_64-pc-windows-msvc
            bundle: helpers
            binaries: "codex-windows-sandbox-setup codex-command-runner"
            runs_on: windows-latest
          - runner: windows-arm64
            target: aarch64-pc-windows-msvc
            bundle: helpers
            binaries: "codex-windows-sandbox-setup codex-command-runner"
            runs_on: windows-11-arm
          - runner: windows-x64
            target: x86_64-pc-windows-msvc
            bundle: app-server
            binaries: "codex-app-server"
            runs_on: windows-latest
          - runner: windows-arm64
            target: aarch64-pc-windows-msvc
            bundle: app-server
            binaries: "codex-app-server"
            runs_on: windows-11-arm

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Print runner specs (Windows)
        shell: powershell
        run: |
          $computer = Get-CimInstance Win32_ComputerSystem
          $cpu = Get-CimInstance Win32_Processor | Select-Object -First 1
          $ramGiB = [math]::Round($computer.TotalPhysicalMemory / 1GB, 1)
          Write-Host "Runner: $env:RUNNER_NAME"
          Write-Host "OS: $([System.Environment]::OSVersion.VersionString)"
          Write-Host "CPU: $($cpu.Name)"
          Write-Host "Logical CPUs: $($computer.NumberOfLogicalProcessors)"
          Write-Host "Physical CPUs: $($computer.NumberOfProcessors)"
          Write-Host "Total RAM: $ramGiB GiB"
          Write-Host "Disk usage:"
          Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize Name, @{Name='Size(GB)';Expression={[math]::Round(($_.Used + $_.Free) / 1GB, 1)}}, @{Name='Free(GB)';Expression={[math]::Round($_.Free / 1GB, 1)}}
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # action pinned; toolchain must match codex-rs/rust-toolchain.toml
        with:
          toolchain: "1.97.1"
          targets: ${{ matrix.target }}
          # Match the components pinned in codex-rs/rust-toolchain.toml so the
          # first `cargo build` inside codex-rs does not trigger a fresh
          # toml-override toolchain sync (which reinstalls only the host std and
          # can drop the target's std -> error[E0463]: can't find crate for
          # `core`).
          components: clippy,rustfmt,rust-src

      - name: Install sccache
        # Fail-open: a GitHub API outage or a bad latest sccache release must
        # not block the release; the build then runs without the cache.
        continue-on-error: true
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Enable sccache if available
        shell: bash
        run: |
          if command -v sccache >/dev/null 2>&1; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          else
            echo "sccache unavailable; building without compiler cache"
          fi

      - name: Cargo build (Windows binaries)
        shell: bash
        run: |
          # Match rust-release.yml: override the workspace release profile's
          # codegen-units = 1 to cut compile times on the slowest (Windows)
          # jobs as well, instead of shipping divergent optimization profiles.
          export CARGO_PROFILE_RELEASE_CODEGEN_UNITS="${CARGO_PROFILE_RELEASE_CODEGEN_UNITS:-16}"
          echo "CARGO_PROFILE_RELEASE_CODEGEN_UNITS: ${CARGO_PROFILE_RELEASE_CODEGEN_UNITS}"
          build_args=()
          for binary in ${{ matrix.binaries }}; do
            build_args+=(--bin "$binary")
          done
          cargo build --target ${{ matrix.target }} --release --timings "${build_args[@]}"

      - name: Upload Cargo timings
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cargo-timings-rust-release-windows-${{ matrix.target }}-${{ matrix.bundle }}
          path: codex-rs/target/**/cargo-timings/cargo-timing.html
          if-no-files-found: warn

      - name: Stage Windows binaries
        shell: bash
        run: |
          output_dir="target/${{ matrix.target }}/release/staged-${{ matrix.bundle }}"
          mkdir -p "$output_dir"
          for binary in ${{ matrix.binaries }}; do
            cp "target/${{ matrix.target }}/release/${binary}.exe" "$output_dir/${binary}.exe"
          done

      - name: Upload Windows binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-binaries-${{ matrix.target }}-${{ matrix.bundle }}
          path: |
            codex-rs/target/${{ matrix.target }}/release/staged-${{ matrix.bundle }}/*

  build-windows:
    needs:
      - build-windows-binaries
    name: Build - ${{ matrix.runner }} - ${{ matrix.target }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 180
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: codex-rs
    env:
      WINDOWS_BINARIES: "codewith codex-responses-api-proxy codex-windows-sandbox-setup codex-command-runner codex-app-server"
      AZURE_TRUSTED_SIGNING_CLIENT_ID: ${{ secrets.AZURE_TRUSTED_SIGNING_CLIENT_ID }}
      AZURE_TRUSTED_SIGNING_TENANT_ID: ${{ secrets.AZURE_TRUSTED_SIGNING_TENANT_ID }}
      AZURE_TRUSTED_SIGNING_SUBSCRIPTION_ID: ${{ secrets.AZURE_TRUSTED_SIGNING_SUBSCRIPTION_ID }}
      AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
      AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
      AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-x64
            target: x86_64-pc-windows-msvc
            runs_on: windows-latest
          - runner: windows-arm64
            target: aarch64-pc-windows-msvc
            runs_on: windows-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download prebuilt Windows primary binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-binaries-${{ matrix.target }}-primary
          path: codex-rs/target/${{ matrix.target }}/release

      - name: Download prebuilt Windows helper binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-binaries-${{ matrix.target }}-helpers
          path: codex-rs/target/${{ matrix.target }}/release

      - name: Download prebuilt Windows app-server binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-binaries-${{ matrix.target }}-app-server
          path: codex-rs/target/${{ matrix.target }}/release

      - name: Verify binaries
        shell: bash
        run: |
          set -euo pipefail
          for binary in ${WINDOWS_BINARIES}; do
            ls -lh "target/${{ matrix.target }}/release/${binary}.exe"
          done

      - name: Sign Windows binaries with Azure Trusted Signing
        if: >-
          ${{
            env.AZURE_TRUSTED_SIGNING_CLIENT_ID != '' &&
            env.AZURE_TRUSTED_SIGNING_TENANT_ID != '' &&
            env.AZURE_TRUSTED_SIGNING_SUBSCRIPTION_ID != '' &&
            env.AZURE_TRUSTED_SIGNING_ENDPOINT != '' &&
            env.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME != '' &&
            env.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME != ''
          }}
        uses: ./.github/actions/windows-code-sign
        with:
          target: ${{ matrix.target }}
          binaries: ${{ env.WINDOWS_BINARIES }}
          client-id: ${{ env.AZURE_TRUSTED_SIGNING_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TRUSTED_SIGNING_TENANT_ID }}
          subscription-id: ${{ env.AZURE_TRUSTED_SIGNING_SUBSCRIPTION_ID }}
          endpoint: ${{ env.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          account-name: ${{ env.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ env.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}

      - name: Stage artifacts
        shell: bash
        run: |
          dest="dist/${{ matrix.target }}"
          mkdir -p "$dest"

          for binary in ${WINDOWS_BINARIES}; do
            cp "target/${{ matrix.target }}/release/${binary}.exe" \
              "$dest/${binary}-${{ matrix.target }}.exe"
          done

      - name: Install DotSlash
        uses: facebook/install-dotslash@1e4e7b3e07eaca387acb98f1d4720e0bee8dbb6a # v2

      - name: Build Codex package archives
        shell: bash
        run: |
          set -euo pipefail
          for bundle in primary app-server; do
            bash "${GITHUB_WORKSPACE}/.github/scripts/build-codex-package-archive.sh" \
              --target "${{ matrix.target }}" \
              --bundle "$bundle" \
              --entrypoint-dir "target/${{ matrix.target }}/release" \
              --archive-dir "dist/${{ matrix.target }}"
          done

      - name: Compress artifacts
        shell: bash
        run: |
          # Path that contains the uncompressed binaries for the current
          # ${{ matrix.target }}
          dest="dist/${{ matrix.target }}"
          repo_root=$PWD

          # For compatibility with environments that lack the `zstd` tool we
          # additionally create a `.tar.gz` and `.zip` for every Windows binary.
          # The end result is:
          #   codewith-<target>.zst
          #   codewith-<target>.tar.gz
          #   codewith-<target>.zip
          for f in "$dest"/*; do
            base="$(basename "$f")"
            # Skip files that are already archives (shouldn't happen, but be
            # safe).
            if [[ "$base" == *.tar.gz || "$base" == *.tar.zst || "$base" == *.zip || "$base" == *.dmg ]]; then
              continue
            fi

            # Don't try to compress signature bundles.
            if [[ "$base" == *.sigstore ]]; then
              continue
            fi

            # Create per-binary tar.gz
            tar -C "$dest" -czf "$dest/${base}.tar.gz" "$base"

            # Create zip archive for Windows binaries.
            # Must run from inside the dest dir so 7z won't embed the
            # directory path inside the zip.
            if [[ "$base" == "codewith-${{ matrix.target }}.exe" ]]; then
              # Bundle the sandbox helper binaries into the main Codewith zip so
              # WinGet installs include the required helpers next to codewith.exe.
              # Fall back to the single-binary zip if the helpers are missing
              # to avoid breaking releases.
              bundle_dir="$(mktemp -d)"
              runner_src="$dest/codex-command-runner-${{ matrix.target }}.exe"
              setup_src="$dest/codex-windows-sandbox-setup-${{ matrix.target }}.exe"
              if [[ -f "$runner_src" && -f "$setup_src" ]]; then
                cp "$dest/$base" "$bundle_dir/$base"
                cp "$runner_src" "$bundle_dir/codex-command-runner.exe"
                cp "$setup_src" "$bundle_dir/codex-windows-sandbox-setup.exe"
                # Use an absolute path so bundle zips land in the real dist
                # dir even when 7z runs from a temp directory.
                (cd "$bundle_dir" && 7z a "$repo_root/$dest/${base}.zip" .)
              else
                echo "warning: missing sandbox binaries; falling back to single-binary zip"
                echo "warning: expected $runner_src and $setup_src"
                (cd "$dest" && 7z a "${base}.zip" "$base")
              fi
              rm -rf "$bundle_dir"
            else
              (cd "$dest" && 7z a "${base}.zip" "$base")
            fi

            # Keep raw executables and produce .zst alongside them.
            "${GITHUB_WORKSPACE}/.github/workflows/zstd" -T0 -3 "$dest/$base"
          done

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.target }}
          path: |
            codex-rs/dist/${{ matrix.target }}/*
