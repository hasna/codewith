name: provider-failure-verify

on:
  push:
    branches:
      - build/infinity-agent-attestation

permissions:
  contents: read

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  CARGO_BUILD_JOBS: "2"
  CARGO_INCREMENTAL: "0"

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Linux build prerequisites
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libcap-dev \
            libssl-dev \
            pkg-config
      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
      - name: Test provider failure metadata and app-server notifications
        run: |
          cargo test --locked -p codex-protocol provider_auth_preserves_transient_io_public_behavior
          cargo test --locked -p codex-app-server --lib provider_failure
          cargo test --locked -p codex-app-server --test all external_auth_refresh_error_fails_turn
          cargo test --locked -p codex-app-server --test all turn_completed_preserves_privacy_safe_provider_failure
