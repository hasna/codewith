name: sdk

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  python-sdk:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Test Python SDK
        shell: bash
        run: |
          set -euo pipefail

          # Run inside a glibc Linux image so dependency resolution exercises
          # the pinned manylinux runtime wheel that users install.
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp/codex-python-sdk-home \
            -e UV_LINK_MODE=copy \
            -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
            -w "${GITHUB_WORKSPACE}/sdk/python" \
            python:3.12-slim \
            sh -euxc '
              python -m venv /tmp/uv
              /tmp/uv/bin/python -m pip install uv==0.11.3
              /tmp/uv/bin/uv sync --extra dev --frozen
              /tmp/uv/bin/uv run --extra dev ruff check --output-format=github .
              /tmp/uv/bin/uv run --extra dev ruff format --check .
              /tmp/uv/bin/uv run --extra dev pytest
            '

  sdks:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Install Linux build prerequisites
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0

      - name: Setup pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - name: Build Codewith with Cargo
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked -p codex-cli --bin codewith

          # Stage the binary into the workspace and point the SDK tests at that
          # stable path. The tests spawn `codewith` directly many times, so using a
          # normal executable path is more reliable than invoking Cargo for each
          # test process.
          install_dir="${GITHUB_WORKSPACE}/.tmp/sdk-ci"
          mkdir -p "${install_dir}"
          install -m 755 "target/debug/codewith" "${install_dir}/codewith"
          echo "CODEWITH_EXEC_PATH=${install_dir}/codewith" >> "$GITHUB_ENV"
          echo "CODEX_EXEC_PATH=${install_dir}/codewith" >> "$GITHUB_ENV"
        working-directory: codex-rs
        env:
          CARGO_INCREMENTAL: "0"

      - name: Warm up Cargo-built Codewith
        shell: bash
        run: |
          set -euo pipefail
          "${CODEWITH_EXEC_PATH}" --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK packages
        run: pnpm -r --filter ./sdk/typescript run build

      - name: Lint SDK packages
        run: pnpm -r --filter ./sdk/typescript run lint

      - name: Test SDK packages
        run: pnpm -r --filter ./sdk/typescript run test
