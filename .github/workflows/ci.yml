name: ci

on:
  pull_request: {}
  push: { branches: [main] }

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Verify codex-rs Cargo manifests inherit workspace settings
        run: python3 .github/scripts/verify_cargo_workspace_manifests.py

      - name: Verify codex-tui does not import codex-core directly
        run: python3 .github/scripts/verify_tui_core_boundary.py

      - name: Verify Bazel clippy flags match Cargo workspace lints
        run: python3 .github/scripts/verify_bazel_clippy_lints.py

      - name: Test Codex package builder
        run: python3 -m unittest discover -s scripts/codex_package -p 'test_*.py'

      - name: Test npm package staging metadata
        run: python3 -m unittest codex-cli/scripts/test_build_npm_package.py

      - name: Test GitHub workflow helpers
        run: python3 -m unittest discover -s .github/scripts -p 'test_*.py'

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test clean-prefix npm and Bun install smoke
        env:
          CODEWITH_SMOKE_STRICT: "1"
        run: python3 -m unittest codex-cli/scripts/test_install_smoke.py

      - name: Test SDK clean-prefix npm and Bun install smoke
        env:
          CODEWITH_SMOKE_STRICT: "1"
        run: python3 -m unittest sdk/typescript/scripts/test_install_smoke.py

      - name: Stage npm package
        id: stage_npm_package
        run: |
          set -euo pipefail
          CODEWITH_VERSION=0.1.0
          OUTPUT_DIR="${RUNNER_TEMP}"
          python3 ./codex-cli/scripts/build_npm_package.py \
            --package codex \
            --release-version "$CODEWITH_VERSION" \
            --pack-output "${OUTPUT_DIR}/codewith-npm-${CODEWITH_VERSION}.tgz"
          PACK_OUTPUT="${OUTPUT_DIR}/codewith-npm-${CODEWITH_VERSION}.tgz"
          echo "pack_output=$PACK_OUTPUT" >> "$GITHUB_OUTPUT"

      - name: Upload staged npm package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codewith-npm-staging
          path: ${{ steps.stage_npm_package.outputs.pack_output }}

      - name: Ensure root README.md contains only ASCII and certain Unicode code points
        run: ./scripts/asciicheck.py README.md
      - name: Check root README ToC
        run: python3 scripts/readme_toc.py README.md

      - uses: taiki-e/install-action@50414676f9f5d50a65992c6dd2ed02641263226c # v2.82.10
        with:
          tool: just@1.51.0
      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          version: "0.11.3"
      - name: Check formatting (run `just fmt` to fix)
        run: just fmt-check

      - name: Prettier (run `pnpm run format:fix` to fix)
        run: pnpm run format
